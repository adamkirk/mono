services:
  traefik:
    image: traefik:latest
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./.local/traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./.local/traefik/dynamic:/etc/traefik/dynamic:ro"
      - "./.local/traefik/certs:/etc/traefik/certs:ro"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${PANOPTES_TRAEFIK_HOST}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

  api:
    build:
      context: ./api
      target: dev
    working_dir: /app
    volumes:
      - ./api:/app
    environment:
      # Means nothing yet.
      APP_CMD: "serve"
      AIR_DEBUG: ${AIR_DEBUG:-false}
      PANOPTES_SERVER_DB_POSTGRES_HOST: postgres
      PANOPTES_SERVER_DB_POSTGRES_USERNAME: ${PANOPTES_POSTGRES_APP_USER}
      PANOPTES_SERVER_DB_POSTGRES_PASSWORD: ${PANOPTES_POSTGRES_APP_PASSWORD}
      PANOPTES_SERVER_DB_POSTGRES_PORT: ${PANOPTES_POSTGRES_PORT}
      PANOPTES_SERVER_DB_POSTGRES_DBNAME: ${PANOPTES_POSTGRES_DB}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${PANOPTES_API_HOST}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  postgres:
    image: postgres:18
    ports:
      # Allow users to connect from their host for development
      - "${PANOPTES_POSTGRES_HOST_PORT}:${PANOPTES_POSTGRES_PORT}"
    environment:
      PGDATA: /home/postgres/pgdata/data
      POSTGRES_PASSWORD: ${PANOPTES_POSTGRES_ROOT_PASSWORD}
      POSTGRES_USER: ${PANOPTES_POSTGRES_ROOT_USER}
      POSTGRES_DB: ${PANOPTES_POSTGRES_DB}
      PANOPTES_POSTGRES_SCHEMA: ${PANOPTES_POSTGRES_SCHEMA}
      PANOPTES_POSTGRES_APP_USER: ${PANOPTES_POSTGRES_APP_USER}
      PANOPTES_POSTGRES_APP_PASSWORD: ${PANOPTES_POSTGRES_APP_PASSWORD}
      PANOPTES_POSTGRES_MIGRATOR_USER: ${PANOPTES_POSTGRES_MIGRATOR_USER}
      PANOPTES_POSTGRES_MIGRATOR_PASSWORD: ${PANOPTES_POSTGRES_MIGRATOR_PASSWORD}
    volumes:
      - postgres:/home/postgres/pgdata/data
      - ${PANOPTES_POSTGRES_INIT_DIR}/1000_setup.sh:/docker-entrypoint-initdb.d/1000_setup.sh

  pgadmin:
    image: dpage/pgadmin4:8.12
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PANOPTES_PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PANOPTES_PGADMIN_PASSWORD}
      # Disable login and security precautions; useful in dev
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: 'False'
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: "['test']"
    volumes:
      - "${PANOPTES_PGADMIN_SERVERS_FILEPATH}:/pgadmin4/servers.json"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`${PANOPTES_PGADMIN_HOST}`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=${PANOPTES_PGADMIN_PORT}"

  migrate:
    profiles:
      - manual
    image: migrate/migrate:4
    environment:
      POSTGRES_URL: postgres://${PANOPTES_POSTGRES_MIGRATOR_USER}:${PANOPTES_POSTGRES_MIGRATOR_PASSWORD}@postgres:${PANOPTES_POSTGRES_PORT}/${PANOPTES_POSTGRES_DB}?search_path=${PANOPTES_POSTGRES_SCHEMA}&sslmode=disable
    volumes:
      - ${PANOPTES_MIGRATIONS_DIR}:/migrations
      - ${PANOPTES_DB_MIGRATE_SCRIPT}:/scripts/migrate.sh
    entrypoint: /scripts/migrate.sh

  ui:
    build:
      context: ./ui
      target: dev
    working_dir: /app
    volumes:
      - ./ui:/app
    command: npm run dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=Host(`${PANOPTES_UI_HOST}`)"
      - "traefik.http.routers.ui.entrypoints=websecure"
      - "traefik.http.routers.ui.tls=true"
      - "traefik.http.services.ui.loadbalancer.server.port=3000"

volumes:
  postgres:
